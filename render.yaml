services:
  - name: ecommerce-app
    type: web
    runtime: python
    region: oregon  # Change to your preferred region
    plan: free  # Change to "starter" or "pro" if needed
    envVars:
      - key: DATABASE_URL
        sync: false  # Set "true" if using a managed PostgreSQL database
